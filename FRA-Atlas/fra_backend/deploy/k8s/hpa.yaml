apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata: { name: fra-web-hpa }
spec:
  scaleTargetRef: { apiVersion: apps/v1, kind: Deployment, name: fra-web }
  minReplicas: 3
  maxReplicas: 20
  metrics:
    - type: Resource
      resource: { name: cpu, target: { type: Utilization, averageUtilization: 70 } }
