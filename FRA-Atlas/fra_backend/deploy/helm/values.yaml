image:
  repository: fra-atlas
  tag: latest
web:
  replicas: 5
  resources:
    requests: { memory: 256Mi, cpu: 250m }
    limits: { memory: 512Mi, cpu: 500m }
worker:
  replicas: 3
beat:
  replicas: 1
ingress:
  host: api.fra-atlas.gov.in
autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 20
  targetCPUUtilizationPercentage: 70
postgis:
  enabled: true
redis:
  enabled: true
