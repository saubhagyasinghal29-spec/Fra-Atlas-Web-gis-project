apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-web
spec:
  replicas: {{ .Values.web.replicas }}
  selector: { matchLabels: { app: {{ .Release.Name }}-web } }
  template:
    metadata:
      labels: { app: {{ .Release.Name }}-web }
      annotations: { prometheus.io/scrape: "true", prometheus.io/path: "/metrics", prometheus.io/port: "8000" }
    spec:
      containers:
        - name: web
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          ports: [{ containerPort: 8000 }]
          envFrom:
            - configMapRef: { name: {{ .Release.Name }}-config }
            - secretRef: { name: {{ .Release.Name }}-secret }
          resources: {{- toYaml .Values.web.resources | nindent 12 }}
          readinessProbe: { httpGet: { path: /health/, port: 8000 }, initialDelaySeconds: 10 }
          livenessProbe: { httpGet: { path: /health/, port: 8000 }, initialDelaySeconds: 20 }
