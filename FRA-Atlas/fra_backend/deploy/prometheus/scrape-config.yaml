# Add to prometheus.yml scrape_configs. Targets are discovered via the
# prometheus.io/scrape pod annotations set in deploy/k8s/deployment.yaml.
scrape_configs:
  - job_name: fra-atlas
    kubernetes_sd_configs: [{ role: pod }]
    relabel_configs:
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
        action: keep
        regex: "true"
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
        action: replace
        target_label: __metrics_path__
        regex: (.+)
