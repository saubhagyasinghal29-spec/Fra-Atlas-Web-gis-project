groups:
  - name: fra-atlas
    rules:
      - alert: HighApiErrorRate
        expr: sum(rate(django_http_responses_total_by_status{status=~"5.."}[5m])) / sum(rate(django_http_responses_total_by_status[5m])) > 0.05
        for: 5m
        labels: { severity: critical }
        annotations: { summary: "API 5xx error rate above 5%" }
      - alert: ApiLatencyP95High
        expr: histogram_quantile(0.95, sum(rate(django_http_requests_latency_seconds_by_view_method_bucket[5m])) by (le)) > 0.5
        for: 10m
        labels: { severity: warning }
        annotations: { summary: "API P95 latency above 500ms" }
      - alert: CeleryQueueBacklog
        expr: celery_queue_length > 10000
        for: 10m
        labels: { severity: warning }
        annotations: { summary: "Celery queue depth above 10k (backlog accumulating)" }
      - alert: AuditChainTampering
        expr: increase(fra_audit_tampering_detected_total[1h]) > 0
        labels: { severity: critical }
        annotations: { summary: "Audit log integrity verification detected tampering" }
