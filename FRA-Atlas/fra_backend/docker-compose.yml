# Local production-like stack: Postgres/PostGIS + Redis + web + Celery worker + beat.
services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: fra_atlas
      POSTGRES_USER: fra
      POSTGRES_PASSWORD: fra
    volumes: ["pgdata:/var/lib/postgresql/data"]
    ports: ["5432:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fra"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

  web:
    build: .
    command: gunicorn config.wsgi:application -c gunicorn.conf.py
    environment: &appenv
      DATABASE_URL: postgis://fra:fra@db:5432/fra_atlas
      CELERY_BROKER_URL: redis://redis:6379/0
      AUDIT_LOG_SECRET: ${AUDIT_LOG_SECRET:-rotate-me}
      DJANGO_DEBUG: "1"
      REDIS_URL: redis://redis:6379/0
      USE_GIS: "1"
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-dev}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-*}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    ports: ["8000:8000"]

  worker:
    build: .
    command: celery -A config worker -l info --concurrency=4
    environment: *appenv
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  beat:
    build: .
    command: celery -A config beat -l info
    environment: *appenv
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

volumes:
  pgdata:
